name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Show tree-sitter version
        run: pip show tree-sitter tree-sitter-python tree-sitter-javascript

      - name: Lint
        run: ruff check saar/ tests/

      - name: Test
        run: pytest tests/ -v --tb=long 2>&1

  # Quick smoke test: install from built wheel and run CLI
  install-test:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build wheel
        run: |
          pip install build
          python -m build

      - name: Install from wheel
        run: pip install dist/*.whl

      - name: Smoke test CLI
        run: |
          saar --version
          saar extract . --format markdown --no-interview
